version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pccl
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/pccl
      - IDENTITY_SERVICE_URL=http://identity-service:4001
      - LEARNING_SERVICE_URL=http://learning-service:4002
      - CERTIFICATION_SERVICE_URL=http://certification-audit-service:4003
      - JWT_SECRET=changeme
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres

  identity-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.identity
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/pccl
      - JWT_SECRET=changeme
    depends_on:
      - postgres

  learning-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.learning
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/pccl
      - JWT_SECRET=changeme
    depends_on:
      - postgres

  certification-audit-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.certification
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/pccl
      - JWT_SECRET=changeme
    depends_on:
      - postgres

volumes:
  pgdata:
    name: pccl_pgdata
